<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>رشف - نظام المهام</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Tahoma,Arial,sans-serif;}
body{background:#F2F2F7;min-height:100vh;direction:rtl;}
.page{max-width:480px;margin:0 auto;min-height:100vh;}

/* LOGIN */
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.logo{width:68px;height:68px;background:#5046E5;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;font-weight:800;margin-bottom:16px;}
.login-title{font-size:22px;font-weight:700;color:#1C1C1E;margin-bottom:5px;}
.login-sub{font-size:14px;color:#8E8E93;margin-bottom:28px;}
.pin-card{background:#fff;border-radius:16px;padding:22px;width:100%;max-width:300px;box-shadow:0 2px 12px rgba(0,0,0,.08);}
.pin-disp{height:52px;background:#F2F2F7;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;letter-spacing:5px;margin-bottom:14px;border:1.5px solid transparent;transition:border-color .2s;}
.pin-disp.err{border-color:#FF3B30;background:#FFF0EF;}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.nb{height:52px;background:#F2F2F7;border:none;border-radius:10px;font-size:20px;font-weight:600;color:#1C1C1E;cursor:pointer;transition:background .1s;}
.nb:active{background:#E5E5EA;}
.nb.empty{background:transparent;cursor:default;}
.nb.del{font-size:16px;color:#8E8E93;}
.login-btn{width:100%;height:46px;background:#5046E5;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;}
.login-btn:disabled{opacity:.35;cursor:not-allowed;}
.err-txt{color:#FF3B30;font-size:12px;text-align:center;margin-top:8px;min-height:16px;}

/* APP */
.app{display:none;}
.header{background:#fff;border-bottom:1px solid #E5E5EA;padding:12px 16px 0;position:sticky;top:0;z-index:20;}
.header-top{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.back{color:#5046E5;font-size:13px;cursor:pointer;font-weight:500;padding:2px 0;min-width:44px;}
.header-title{flex:1;text-align:center;font-size:16px;font-weight:600;color:#1C1C1E;}
.header-right{display:flex;align-items:center;gap:6px;min-width:44px;justify-content:flex-end;}
.badge{font-size:10px;font-weight:700;border-radius:5px;padding:2px 7px;color:#fff;}
.b-super{background:#5046E5;}.b-manager{background:#0071E3;}.b-emp{background:#34C759;}
.out-btn{font-size:11px;color:#8E8E93;cursor:pointer;border:1px solid #E5E5EA;border-radius:5px;padding:2px 7px;}
.tabs{display:flex;}
.tab{flex:1;text-align:center;padding:8px 0;font-size:12px;color:#8E8E93;border-bottom:2px solid transparent;cursor:pointer;font-weight:500;}
.tab.on{color:#5046E5;border-bottom-color:#5046E5;font-weight:600;}

/* BODY */
.body{padding:14px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.sc{background:#fff;border-radius:12px;padding:14px;border:1px solid #E5E5EA;}
.sc-num{font-size:22px;font-weight:700;color:#1C1C1E;}
.sc-lbl{font-size:11px;color:#8E8E93;margin-top:2px;}
.green{color:#34C759;}.orange{color:#FF9500;}.red{color:#FF3B30;}

/* CARDS */
.card{background:#fff;border-radius:12px;border:1px solid #E5E5EA;padding:13px;margin-bottom:10px;cursor:pointer;transition:border-color .15s;}
.card:hover{border-color:#5046E5;}
.card-row{display:flex;align-items:center;gap:10px;}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
.av0{background:#EEF0FF;color:#3730A3;}.av1{background:#ECFDF5;color:#065F46;}.av2{background:#FEF3C7;color:#92400E;}.av3{background:#EFF6FF;color:#1E40AF;}.av4{background:#FDF2F8;color:#9D174D;}
.card-info{flex:1;min-width:0;}
.card-name{font-size:14px;font-weight:600;color:#1C1C1E;margin-bottom:2px;}
.card-sub{font-size:11px;color:#8E8E93;}
.card-score{font-size:14px;font-weight:700;}
.pin-tag{font-size:10px;background:#F2F2F7;color:#5046E5;border-radius:4px;padding:1px 5px;font-family:monospace;margin-right:4px;}
.arr{font-size:18px;color:#C7C7CC;}

/* TASK */
.tc{background:#fff;border-radius:12px;border:1px solid #E5E5EA;padding:12px 13px;margin-bottom:10px;}
.tc.late{border-color:#FF3B30;background:#FFF5F5;}
.tc.done{opacity:.55;}
.tc.pardoned{border-color:#34C759;background:#F5FFF7;}
.tc-title{font-size:14px;font-weight:600;color:#1C1C1E;margin-bottom:5px;}
.tc.done .tc-title{text-decoration:line-through;color:#8E8E93;}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px;}
.chip{font-size:10px;border-radius:6px;padding:2px 7px;font-weight:600;}
.cd{background:#EEF0FF;color:#3730A3;}.ct{background:#FEF3C7;color:#92400E;}.cl{background:#FEE2E2;color:#991B1B;}.cg{background:#ECFDF5;color:#065F46;}.cn{background:#F2F2F7;color:#3A3A3C;}
.lbadge{display:inline-block;font-size:10px;background:#FF3B30;color:#fff;border-radius:4px;padding:2px 7px;margin-bottom:4px;font-weight:600;}
.pbadge{display:inline-block;font-size:10px;background:#34C759;color:#fff;border-radius:4px;padding:2px 7px;margin-bottom:4px;font-weight:600;}
.tnote{font-size:11px;color:#8E8E93;margin-top:3px;line-height:1.5;}
.done-note{margin-top:5px;background:#ECFDF5;border-radius:7px;padding:5px 9px;font-size:11px;color:#065F46;line-height:1.5;}
.done-when{font-size:10px;color:#059669;margin-top:2px;}
.tactions{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap;}
.abtn{padding:4px 10px;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;}
.ab-g{background:#ECFDF5;color:#065F46;}.ab-b{background:#EEF0FF;color:#3730A3;}.ab-r{background:#FEE2E2;color:#991B1B;}
.complete-btn{width:100%;padding:11px;background:#34C759;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:5px;}
.late-warn{background:#FEE2E2;border-radius:7px;padding:7px 10px;font-size:11px;color:#991B1B;margin-bottom:7px;line-height:1.6;}

/* MISC */
.add-btn{width:100%;padding:11px;border-radius:10px;border:1.5px dashed #C7C7CC;background:transparent;color:#8E8E93;font-size:13px;cursor:pointer;margin-top:4px;}
.add-btn:hover{border-color:#5046E5;color:#5046E5;background:#F5F5FF;}
.sec-hd{font-size:11px;font-weight:600;color:#8E8E93;margin:14px 0 7px;text-transform:uppercase;}
.empty{text-align:center;padding:40px 0;color:#C7C7CC;font-size:13px;line-height:2.2;}
.del-btn{width:100%;padding:10px;border-radius:10px;border:1px solid #FEE2E2;background:#FEF2F2;color:#DC2626;font-size:12px;cursor:pointer;margin-top:8px;}
.info-box{background:#EEF0FF;border-radius:8px;padding:9px 12px;margin-bottom:12px;font-size:11px;color:#3730A3;line-height:1.7;}
.warn-box{background:#FEF3C7;border-radius:8px;padding:9px 12px;margin-bottom:12px;font-size:11px;color:#92400E;line-height:1.7;}
.month-bar{display:flex;align-items:center;gap:8px;margin-bottom:13px;background:#fff;border-radius:10px;border:1px solid #E5E5EA;padding:9px 12px;}
.month-bar select{flex:1;border:none;background:transparent;font-size:13px;color:#1C1C1E;outline:none;}
.pdf-btn{padding:7px 13px;background:#5046E5;color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;}

/* PERMS */
.perm-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F2F2F7;}
.perm-row:last-child{border-bottom:none;}
.perm-lbl{font-size:13px;color:#1C1C1E;}
.tog{width:44px;height:26px;background:#E5E5EA;border-radius:13px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.tog.on{background:#34C759;}
.tog::after{content:'';position:absolute;top:3px;right:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:right .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.tog.on::after{right:calc(100% - 23px);}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;z-index:100;}
.sheet{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:480px;margin:0 auto;padding:20px 16px 36px;max-height:90vh;overflow-y:auto;}
.sh-title{font-size:16px;font-weight:700;color:#1C1C1E;margin-bottom:16px;text-align:center;}
.flbl{font-size:11px;color:#8E8E93;margin-bottom:4px;display:block;font-weight:500;}
.finp{width:100%;padding:10px 12px;border:1px solid #E5E5EA;border-radius:10px;background:#F9F9FB;color:#1C1C1E;font-size:14px;outline:none;direction:rtl;margin-bottom:12px;}
.finp:focus{border-color:#5046E5;}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px;}
.fbtn-row{display:flex;gap:9px;margin-top:8px;}
.fbtn-ok{flex:1;padding:12px;background:#5046E5;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;}
.fbtn-ok:disabled{opacity:.4;cursor:not-allowed;}
.fbtn-cancel{padding:12px 16px;background:transparent;color:#8E8E93;border:1px solid #E5E5EA;border-radius:10px;font-size:13px;cursor:pointer;}
.narea{width:100%;padding:10px 12px;border:1px solid #E5E5EA;border-radius:10px;background:#F9F9FB;color:#1C1C1E;font-size:13px;outline:none;direction:rtl;resize:none;margin-bottom:12px;line-height:1.6;}
.narea:focus{border-color:#5046E5;}
.gen-btn{display:block;padding:5px 11px;background:#F2F2F7;border:1px solid #E5E5EA;border-radius:6px;font-size:11px;color:#5046E5;cursor:pointer;margin-bottom:12px;}
.assign-list{max-height:200px;overflow-y:auto;border:1px solid #E5E5EA;border-radius:10px;margin-bottom:12px;}
.assign-item{display:flex;align-items:center;gap:9px;padding:10px 12px;border-bottom:1px solid #F2F2F7;cursor:pointer;}
.assign-item:last-child{border-bottom:none;}
.assign-item.sel{background:#F5F5FF;}
.achk{width:20px;height:20px;border-radius:5px;border:2px solid #C7C7CC;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:all .15s;}
.achk.on{background:#5046E5;border-color:#5046E5;color:#fff;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div class="logo">ر</div>
  <div class="login-title">نظام رشف</div>
  <div class="login-sub">أدخل كلمة السر للدخول</div>
  <div class="pin-card">
    <div class="pin-disp" id="pin-disp"></div>
    <div class="numpad" id="numpad">
      <button class="nb" onclick="numPress(1)">1</button>
      <button class="nb" onclick="numPress(2)">2</button>
      <button class="nb" onclick="numPress(3)">3</button>
      <button class="nb" onclick="numPress(4)">4</button>
      <button class="nb" onclick="numPress(5)">5</button>
      <button class="nb" onclick="numPress(6)">6</button>
      <button class="nb" onclick="numPress(7)">7</button>
      <button class="nb" onclick="numPress(8)">8</button>
      <button class="nb" onclick="numPress(9)">9</button>
      <button class="nb empty" style="background:transparent;border:none;cursor:default;"></button>
      <button class="nb" onclick="numPress(0)">0</button>
      <button class="nb del" onclick="numDel()">⌫</button>
    </div>
    <button class="login-btn" id="login-btn" disabled onclick="doLogin()">دخول</button>
    <div class="err-txt" id="err-txt"></div>
  </div>
</div>

<!-- APP -->
<div class="page app" id="app">
  <div class="header">
    <div class="header-top">
      <span class="back" id="back-btn" onclick="goBack()" style="visibility:hidden;">&#8592; رجوع</span>
      <span class="header-title" id="h-title">رشف</span>
      <div class="header-right">
        <span class="badge" id="role-badge"></span>
        <span class="out-btn" onclick="doLogout()">خروج</span>
      </div>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>
  <div class="body" id="body"></div>
</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import {getFirestore,collection,doc,onSnapshot,addDoc,updateDoc,deleteDoc} from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyBXiNX1Gm1JXLLuXz5icRVICM0tjKMmaKU",
  authDomain:"rshaf---tasks.firebaseapp.com",
  projectId:"rshaf---tasks",
  storageBucket:"rshaf---tasks.firebasestorage.app",
  messagingSenderId:"707919327845",
  appId:"1:707919327845:web:a68c396a255e28aadf0c8c"
}));

// ── STATE ──
const SUPER_PIN = '1108362599';
let users = [], tasks = [];
let me = null;
let screen = 'home'; // home | managers | employees | managerDetail | empTasks | allTasks | history | myTasks
let focusId = null;  // manager id or employee id being viewed
let empTab = 0;      // employee tab: 0=pending 1=done

// ── FIREBASE ──
onSnapshot(collection(db,'users'), s => {
  users = s.docs.map(d=>({id:d.id,...d.data()}));
  if(me) draw();
  else tryRestore();
});
let visits = [];
onSnapshot(collection(db,'visits'), s => {
  visits = s.docs.map(d=>({id:d.id,...d.data()}));
  if(me) draw();
});
onSnapshot(collection(db,'tasks'), s => {
  tasks = s.docs.map(d=>({id:d.id,...d.data()}));
  if(me) draw();
});

// ── HELPERS ──
const p2 = x => String(x).padStart(2,'0');
const now = () => { const n=new Date(); return `${n.getFullYear()}-${p2(n.getMonth()+1)}-${p2(n.getDate())} ${p2(n.getHours())}:${p2(n.getMinutes())}`; };
const genPin = () => Array.from({length:10},()=>Math.floor(Math.random()*10)).join('');
const fmtDT = d => `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())} ${p2(d.getHours())}:${p2(d.getMinutes())}`;

function dueOf(t) {
  if(!t.createdAt||!t.durationDays) return null;
  const b = new Date(t.createdAt.replace(' ','T'));
  b.setTime(b.getTime() + parseFloat(t.durationDays)*24*3600*1000);
  return b;
}
function isLate(t) { if(t.done||t.pardoned) return false; const d=dueOf(t); return d&&new Date()>d; }
function hleft(t) { const d=dueOf(t); if(!d||t.done) return null; return (d-new Date())/3600000; }
function scoreOf(uid) { let s=0; tasks.filter(t=>t.uid===uid).forEach(t=>{ if(isLate(t)) s-=(parseInt(t.pts)||5); }); return s; }
function scCls(s) { return s===0?'green':s>=-10?'orange':'red'; }

const managers = () => users.filter(u=>u.role==='manager');
const employees = () => users.filter(u=>u.role==='employee');
const myEmps = () => employees();
const isSuper = () => me && me.role==='super';
const isManager = () => false; // removed
const isEmployee = () => me && me.role==='employee';
const can = perm => isSuper() || (isManager() && (me.perms||{})[perm]);

// ── LOGIN ──
let pin = '';
// Numpad handlers
window.numPress = function(k) {
  document.getElementById('err-txt').textContent='';
  document.getElementById('pin-disp').classList.remove('err');
  if(pin.length<10) pin+=String(k);
  updPin();
};
window.numDel = function() {
  document.getElementById('err-txt').textContent='';
  document.getElementById('pin-disp').classList.remove('err');
  pin=pin.slice(0,-1);
  updPin();
};
function updPin() {
  document.getElementById('pin-disp').textContent = '●'.repeat(pin.length)+'•'.repeat(10-pin.length);
  document.getElementById('login-btn').disabled = pin.length!==10;
}
updPin();

window.doLogin = () => {
  if(pin===SUPER_PIN) { me={id:'super',name:'صالح',role:'super'}; go(); return; }
  const u = users.find(x=>x.pin===pin);
  if(!u) {
    document.getElementById('pin-disp').classList.add('err');
    document.getElementById('err-txt').textContent='كلمة السر غير صحيحة';
    pin=''; setTimeout(()=>{updPin();document.getElementById('pin-disp').classList.remove('err');},900);
    return;
  }
  me=u; sessionStorage.setItem('rshaf_id', u.id); go();
};

window.doLogout = () => {
  me=null; pin=''; updPin(); screen='home'; focusId=null; empTab=0;
  sessionStorage.removeItem('rshaf_id');
  document.getElementById('app').style.display='none';
  document.getElementById('login-wrap').style.display='flex';
};

function tryRestore() {
  const sid = sessionStorage.getItem('rshaf_id');
  if(!sid) return;
  if(sid==='super') { me={id:'super',name:'صالح',role:'super'}; go(); return; }
  const u = users.find(x=>x.id===sid);
  if(u) { me=u; go(); }
}

function go() {
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('app').style.display='block';
  sessionStorage.setItem('rshaf_id', me.id);
  screen = isEmployee() ? 'myTasks' : 'home';
  focusId = null;
  draw();
}

// ── DRAW ──
function draw() {
  // Refresh me from users (for perms updates)
  if(me.id!=='super') {
    const fresh = users.find(u=>u.id===me.id);
    if(fresh) me=fresh;
  }

  const body = document.getElementById('body');
  const ht = document.getElementById('h-title');
  const tb = document.getElementById('tabs');
  const bb = document.getElementById('back-btn');
  const rb = document.getElementById('role-badge');

  rb.textContent = isSuper()?'مدير عام':'موظف';
  rb.className = 'badge '+(isSuper()?'b-super':'b-emp');

  // Back button visibility
  const showBack = screen!=='home' && screen!=='myTasks';
  bb.style.visibility = showBack ? 'visible':'hidden';

  // Employee
  if(isEmployee()) {
    ht.textContent = me.name;
    tb.innerHTML = `<div class="tab ${empTab===0?'on':''}" onclick="setEmpTab(0)">مهامي</div><div class="tab ${empTab===1?'on':''}" onclick="setEmpTab(1)">المنجزة</div><div class="tab ${empTab===2?'on':''}" onclick="setEmpTab(2)">الزيارات</div>`;
    drawEmpView(body); return;
  }

  // Super/Manager
  if(screen==='home'||screen==='managers'||screen==='employees'||screen==='myEmps') {
    ht.textContent = isSuper()?'لوحة التحكم':'لوحتي';
    tb.innerHTML=`<div class="tab ${screen==='employees'||screen==='home'?'on':''}" onclick="nav('employees')">الموظفون</div><div class="tab ${screen==='allTasks'?'on':''}" onclick="nav('allTasks')">المهام</div><div class="tab ${screen==='visitsOverview'?'on':''}" onclick="nav('visitsOverview')">الزيارات</div><div class="tab ${screen==='visitsMgmt'?'on':''}" onclick="nav('visitsMgmt')">إعداد</div><div class="tab ${screen==='history'?'on':''}" onclick="nav('history')">السجل</div>`;
  } else {
    tb.innerHTML='';
  }

  if(screen==='employees'||screen==='home') { ht.textContent='الموظفون'; drawEmployees(body); }
  else if(screen==='empTasks') { drawEmpTasks(body); }
  else if(screen==='allTasks') { ht.textContent='كل المهام'; drawAllTasks(body); }
  else if(screen==='history') { ht.textContent='السجل'; drawHistory(body); }
  else if(screen==='visitsOverview') { ht.textContent='الزيارات الأسبوعية'; drawVisitsOverview(body); }
  else if(screen==='visitsMgmt') { ht.textContent='إعداد الزيارات'; drawVisitsMgmt(body); }
  else if(screen==='empVisitsMgmt') { drawEmpVisitsMgmt(body); }
  else if(screen==='empVisitDetail') { drawEmpVisitDetail(body); }
}

window.nav = s => { screen=s; focusId=null; draw(); };
window.goBack = () => {
  if(screen==='empTasks') { screen='employees'; focusId=null; }
  else if(screen==='empVisitsMgmt') { screen='visitsMgmt'; focusId=null; }
  else if(screen==='empVisitDetail') { screen='visitsOverview'; focusId=null; }
  else { screen='home'; focusId=null; }
  draw();
};
window.setEmpTab = i => { empTab=i; draw(); };

// ── MANAGERS ──
function drawManagers(body) {
  const mgrs = managers();
  let h = grid2(mgrs.length,'مدير', employees().length,'موظف');
  if(!mgrs.length) { h+=empty('لا يوجد مديرون\nاضغط + لإضافة'); }
  mgrs.forEach((m,i) => {
    const emps = employees().filter(e=>(m.assignedEmployees||[]).includes(e.id));
    const mTasks=tasks.filter(t=>t.uid===m.id&&!t.done).length;
    const mScore=scoreOf(m.id);
    h+=`<div class="card" onclick="openManager('${m.id}')">
      <div class="card-row">
        <div class="av av${i%5}">${m.av||m.name[0]}</div>
        <div class="card-info">
          <div class="card-name">${m.name}${m.pin?` <span class="pin-tag">${m.pin}</span>`:''}</div>
          <div class="card-sub">${m.role_label||'مدير'} · ${emps.length} موظف معين · ${mTasks} مهمة</div>
        </div>
        <span class="card-score ${scCls(mScore)}" style="margin-left:4px;">${mScore}</span>

function taskCard(t, managerView) {
  const late=isLate(t), hl=hleft(t), due=dueOf(t), dueStr=due?fmtDT(due):'';
  let tl='';
  if(!t.done&&!t.pardoned&&hl!==null&&hl>0){
    const h=Math.floor(hl),m=Math.floor((hl-h)*60);
    tl=`<span class="chip cn">${h>0?h+'س ':''} ${m}د</span>`;
  }
  let badge='';
  if(t.pardoned) badge=`<div class="pbadge">تم العفو</div>`;
  else if(late) badge=`<div class="lbadge">متأخر</div>`;

  let acts='';
  if(managerView&&!t.done){
    if(late&&!t.pardoned&&can('pardonTasks')) acts+=`<button class="abtn ab-g" onclick="pardon('${t.id}')">عفو ↩</button>`;
    if(can('extendTasks')) acts+=`<button class="abtn ab-b" onclick="extendModal('${t.id}')">تمديد +</button>`;
  }
  if(managerView&&can('deleteTasks')) acts+=`<button class="abtn ab-r" onclick="delTask('${t.id}')">حذف</button>`;

  return `<div class="tc ${late&&!t.pardoned?'late':''} ${t.done?'done':''} ${t.pardoned&&!t.done?'pardoned':''}">
    ${badge}
    <div class="tc-title">${t.title}</div>
    <div class="chips">
      <span class="chip cd">${t.durationDays} يوم</span>
      ${dueStr?`<span class="chip ct">تسليم: ${dueStr}</span>`:''}
      ${late&&!t.pardoned?`<span class="chip cl">−${t.pts||5} نقطة</span>`:t.pardoned?`<span class="chip cg">عفو</span>`:t.done?`<span class="chip cg">منجزة ✓</span>`:`<span class="chip cn">${t.pts||5} نقاط</span>`}
      ${tl}
    </div>
    ${t.note?`<div class="tnote">${t.note}</div>`:''}
    ${t.done&&t.doneNote?`<div class="done-note">${t.doneNote}<div class="done-when">${t.doneAt||''}</div></div>`:''}
    ${t.done&&!t.doneNote&&t.doneAt?`<div style="font-size:10px;color:#8E8E93;margin-top:3px;">${t.doneAt}</div>`:''}
    ${acts?`<div class="tactions">${acts}</div>`:''}
  </div>`;
}

// ── HISTORY ──
function drawHistory(body) {
  const ids = myEmps().map(e=>e.id);
  const now2=new Date(), months=[];
  for(let i=0;i<6;i++){const d=new Date(now2.getFullYear(),now2.getMonth()-i,1);months.push({v:`${d.getFullYear()}-${p2(d.getMonth()+1)}`,l:d.toLocaleDateString('ar',{year:'numeric',month:'long'})});}
  let sel=months[0].v;
  function build(){
    const done=tasks.filter(t=>t.doneAt&&t.doneAt.startsWith(sel)&&ids.includes(t.uid)).sort((a,b)=>(b.doneAt||'').localeCompare(a.doneAt||''));
    let h=`<div class="month-bar"><select onchange="window._hs=this.value;window._hrb()">${months.map(m=>`<option value="${m.v}" ${m.v===sel?'selected':''}>${m.l}</option>`).join('')}</select><button class="pdf-btn" onclick="exportPDF('${sel}')">PDF</button></div>`;
    if(!done.length){h+=empty('لا توجد مهام منجزة');return h;}
    let by={};done.forEach(t=>{const d=t.doneAt.split(' ')[0];if(!by[d])by[d]=[];by[d].push(t);});
    Object.keys(by).sort((a,b)=>b.localeCompare(a)).forEach(day=>{
      h+=`<div class="sec-hd">${day}</div>`;
      by[day].forEach(t=>{
        const e=users.find(u=>u.id===t.uid);
        h+=`<div class="tc"><div class="tc-title">${t.title}</div><div class="card-sub" style="margin-bottom:5px;">${e?e.name:''}</div>${t.doneNote?`<div class="done-note">${t.doneNote}<div class="done-when">${t.doneAt||''}</div></div>`:`<div style="font-size:10px;color:#8E8E93;">${t.doneAt||''}</div>`}</div>`;
      });
    });
    return h;
  }
  window._hs=sel; window._hrb=()=>{sel=window._hs;body.innerHTML=build();};
  body.innerHTML=build();
}

window.exportPDF = month => {
  const ids=myEmps().map(e=>e.id);
  const done=tasks.filter(t=>t.doneAt&&t.doneAt.startsWith(month)&&ids.includes(t.uid));
  const lbl=new Date(month+'-01').toLocaleDateString('ar',{year:'numeric',month:'long'});
  const rows=done.map(t=>{const e=users.find(u=>u.id===t.uid);return `<tr><td>${t.title}</td><td>${e?e.name:''}</td><td>${t.durationDays} يوم</td><td>${t.doneAt||''}</td><td>${t.doneNote||''}</td></tr>`;}).join('');
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><style>body{font-family:Tahoma;direction:rtl;padding:24px;font-size:13px;}h2{color:#5046E5;margin-bottom:16px;}table{width:100%;border-collapse:collapse;}th{background:#5046E5;color:#fff;padding:8px;text-align:right;}td{padding:8px;border-bottom:1px solid #eee;}tr:nth-child(even){background:#F9F9FB;}</style></head><body><h2>تقرير المهام - ${lbl}</h2><p style="color:#8E8E93;margin-bottom:12px;">${done.length} مهمة</p><table><thead><tr><th>المهمة</th><th>الموظف</th><th>المدة</th><th>تاريخ الإنجاز</th><th>الملاحظة</th></tr></thead><tbody>${rows}</tbody></table></body></html>`);
  w.document.close(); setTimeout(()=>w.print(),400);
};

// ── EMPLOYEE SELF VIEW ──
function drawEmpView(body) {
  const s=scoreOf(me.id);
  const all=tasks.filter(t=>t.uid===me.id);
  if(empTab===2){ drawMyVisits(body); return; }
  if(empTab===1){
    const done=all.filter(t=>t.done).sort((a,b)=>(b.doneAt||'').localeCompare(a.doneAt||''));
    if(!done.length){body.innerHTML=empty('لا توجد مهام منجزة');return;}
    body.innerHTML=done.map(t=>{
      const due=dueOf(t),ds=due?fmtDT(due):'';
      return `<div class="tc done" style="opacity:1;"><div class="tc-title">${t.title}</div><div class="chips"><span class="chip cd">${t.durationDays} يوم</span>${ds?`<span class="chip ct">${ds}</span>`:''}<span class="chip cg">منجزة ✓</span></div>${t.doneNote?`<div class="done-note">${t.doneNote}<div class="done-when">${t.doneAt||''}</div></div>`:`<div style="font-size:10px;color:#8E8E93;margin-top:3px;">${t.doneAt||''}</div>`}</div>`;
    }).join('');
    return;
  }
  const pending=all.filter(t=>!t.done).sort((a,b)=>(dueOf(a)||new Date(9e15))-(dueOf(b)||new Date(9e15)));
  let h=grid2(s==='0'||s===0?'✓ 0':s,'نقاط الخصم', pending.length,'مهمة معلقة');
  if(!pending.length){h+=empty('🎉 ما في مهام معلقة\nأحسنت!');body.innerHTML=h;return;}
  pending.forEach(t=>{
    const late=isLate(t),hl=hleft(t),due=dueOf(t),ds=due?fmtDT(due):'';
    let tl='';
    if(!late&&hl!==null&&hl>0){const hh=Math.floor(hl),mm=Math.floor((hl-hh)*60);tl=`<span class="chip cn">${hh>0?hh+'س ':''} ${mm}د</span>`;}
    h+=`<div class="tc ${late&&!t.pardoned?'late':''} ${t.pardoned?'pardoned':''}">
      ${late&&!t.pardoned?'<div class="lbadge">متأخر — تم خصم النقاط</div>':''}
      ${t.pardoned?'<div class="pbadge">تم العفو ✓</div>':''}
      <div class="tc-title">${t.title}</div>
      <div class="chips">
        <span class="chip cd">${t.durationDays} يوم</span>
        ${ds?`<span class="chip ct">تسليم: ${ds}</span>`:''}
        ${late&&!t.pardoned?`<span class="chip cl">−${t.pts||5} نقطة</span>`:''}
        ${t.pardoned?`<span class="chip cg">عفو</span>`:''}${tl}
      </div>
      ${t.note?`<div class="tnote">${t.note}</div>`:''}
      ${late&&!t.pardoned?`<div class="late-warn">⚠️ النقاط خُصمت ولا تُسترد إلا بعفو المدير.</div>`:''}
      <button class="complete-btn" onclick="doneModal('${t.id}','${t.title.replace(/'/g,"\\'")}')">تم التنفيذ ✓</button>
    </div>`;
  });
  body.innerHTML=h;
}

function getWeekKey() {
  const n = new Date();
  const d = new Date(n);
  d.setDate(d.getDate() - d.getDay());
  return d.toISOString().slice(0,10);
}

function getWeekLabel() {
  const n = new Date();
  const start = new Date(n);
  start.setDate(start.getDate() - start.getDay());
  const end = new Date(start);
  end.setDate(end.getDate() + 6);
  const f = d => d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  return f(start) + ' ← ' + f(end);
}

    '<div style="font-size:14px;font-weight:600;text-align:center;margin-bottom:14px;color:#5046E5;">' + (b?b.name:'') + '</div>' +
    '<label class="flbl">وقت الزيارة</label>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">' +
    '<div id="t-morning" onclick="selectVisitTime(\'morning\')" style="padding:13px;background:' + (v.time==='morning'?'#FEF3C7':'#F9F9FB') + ';border:2px solid ' + (v.time==='morning'?'#F59E0B':'#E5E5EA') + ';border-radius:10px;text-align:center;cursor:pointer;font-size:15px;font-weight:600;color:#92400E;">☀️ صباحي</div>' +
    '<div id="t-evening" onclick="selectVisitTime(\'evening\')" style="padding:13px;background:' + (v.time==='evening'?'#EEF0FF':'#F9F9FB') + ';border:2px solid ' + (v.time==='evening'?'#6366F1':'#E5E5EA') + ';border-radius:10px;text-align:center;cursor:pointer;font-size:15px;font-weight:600;color:#3730A3;">🌙 مسائي</div>' +
    '</div>' +
    '<label class="flbl">ملاحظة</label>' +
    '<textarea class="narea" id="vn" rows="3">' + (v.note||'') + '</textarea>' +
    '<div class="fbtn-row"><button class="fbtn-cancel" onclick="closeM()">إلغاء</button>' +
    '<button class="fbtn-ok" id="fok" onclick="updateVisit()">حفظ</button></div>';
  modal(html);
};

window.updateVisit = async function() {
  const note = (document.getElementById('vn').value || '').trim();
  const time = window._selTime || 'morning';
  const id = window._editVisitId;
  const fok = document.getElementById('fok');
  if (fok) fok.disabled = true;
  await updateDoc(doc(db, 'visits', id), { time, note });
  closeM();
};

window.deleteVisit = async function(id) {
  if (!confirm('حذف هذه الزيارة؟')) return;
  await deleteDoc(doc(db, 'visits', id));
};


setInterval(()=>{if(me)draw();},30000);
</script>
</body>
</html>
